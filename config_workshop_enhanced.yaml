version: v0.3
listeners:
    - name: http-8899
      address: 0.0.0.0
      port: 8899
      timeout: 2400s

providers:
    defaults:
        default_model: Qwen3.5-9B-NoThinking
    models:
        - name: Qwen3.5-9B-NoThinking
          pricing:
              currency: USD
              prompt_per_1m: 0.10
              completion_per_1m: 0.20
          backend_refs:
            - name: lemonade-small
              protocol: http
              weight: 100
              base_url: http://host.docker.internal:13305/v1
              provider: openai
              api_key: lemonade
        - name: accounts/fireworks/models/kimi-k2p6
          pricing:
              currency: USD
              prompt_per_1m: 3.00
              completion_per_1m: 9.00
          backend_refs:
            - name: fireworks-kimi
              protocol: http
              weight: 100
              base_url: https://api.fireworks.ai/inference/v1
              provider: openai
              api_key: fw_Y38edgg9ng  # REQUIRED: Add your Fireworks API key
        - name: Qwen3.6-35B-A3B-NoThinking
          pricing:
              currency: USD
              prompt_per_1m: 0.40
              completion_per_1m: 0.80
          backend_refs:
            - name: lemonade-large
              protocol: http
              weight: 100
              base_url: http://host.docker.internal:13305/v1
              provider: openai
              api_key: lemonade

routing:
    modelCards:
        - name: Qwen3.5-9B-NoThinking
          param_size: 9B
          context_window_size: 256000
          description: Fast local 9B model for PII-sensitive, simple, and multimodal queries
          capabilities: [chat, audio, vision]
          quality_score: 0.75
          modality: ar
          tags: [local, fast, secure]
        - name: accounts/fireworks/models/kimi-k2p6
          param_size: 1028B
          context_window_size: 262000
          description: Cloud model for complex reasoning and legal research
          capabilities: [chat, reasoning, long-context, vision]
          quality_score: 0.99
          modality: ar
          tags: [cloud, frontier, powerful]
        - name: Qwen3.6-35B-A3B-NoThinking
          param_size: 35B
          context_window_size: 128000
          description: Big local 35B model for R&D
          capabilities: [chat, reasoning]
          quality_score: 0.88
          modality: ar
          tags: [local, complex, private, rnd]

    signals:
        keywords:
            # Workshop-specific: R&D system design keywords
            - name: rnd_design_keywords
              operator: OR
              method: bm25
              keywords:
                  - "design"
                  - "architecture"
                  - "system design"
                  - "ML pipeline"
                  - "fraud detection"
                  - "recommendation engine"
                  - "infrastructure"
                  - "implement"
                  - "scalability"
                  - "microservices"
                  - "real-time"
                  - "stream processing"
                  - "machine learning"
                  - "neural network"
                  - "propose architecture"
                  - "predict stock"
                  - "stock prediction"
                  - "time series forecast"
                  - "ensemble model"
              case_sensitive: false
              bm25_threshold: 0.20

            # Workshop-specific: Legal research keywords
            - name: legal_research_keywords
              operator: OR
              method: bm25
              keywords:
                  - "GDPR"
                  - "CCPA"
                  - "regulation"
                  - "compliance"
                  - "legal"
                  - "contract"
                  - "NDA"
                  - "terms"
                  - "DPA"
                  - "privacy law"
                  - "data protection"
                  - "regulatory"
                  - "case law"
              case_sensitive: false
              bm25_threshold: 0.20

            # Workshop-specific: Finance complex modeling keywords
            - name: finance_modeling_keywords
              operator: OR
              method: bm25
              keywords:
                  - "equity dilution"
                  - "waterfall"
                  - "Series A"
                  - "Series B"
                  - "pre-money"
                  - "post-money"
                  - "valuation"
                  - "cap table"
                  - "dilution modeling"
                  - "model dilution"
                  - "equity grant"
                  - "retention analysis"
                  - "NPV"
                  - "Monte Carlo"
              case_sensitive: false
              bm25_threshold: 0.22

            # Workshop-specific: Simple finance queries (burn rate, runway)
            - name: finance_simple_keywords
              operator: OR
              method: bm25
              keywords:
                  - "burn rate"
                  - "runway"
                  - "monthly expenses"
                  - "cash flow"
              case_sensitive: false
              bm25_threshold: 0.25

            # Workshop-specific: HR benefits/policy queries (non-PII)
            - name: hr_policy_keywords
              operator: OR
              method: bm25
              keywords:
                  - "benefits"
                  - "parental leave"
                  - "vacation"
                  - "PTO"
                  - "policy"
                  - "handbook"
                  - "401k"
                  - "health insurance"
              case_sensitive: false
              bm25_threshold: 0.15

        # ENHANCED: Domain classification for MMLU-style categorization
        domains:
            - name: "finance"
              description: Finance, economics, accounting, financial modeling
              mmlu_categories: ["business", "economics"]

            - name: "law"
              description: Legal regulations, compliance, contracts, jurisprudence
              mmlu_categories: ["law"]

            - name: "computer_science"
              description: System design, software architecture, ML engineering
              mmlu_categories: ["math", "engineering", "computer science"]

            - name: "general"
              description: General knowledge, HR, operations, business
              mmlu_categories: ["other"]

        modality:
            - name: AR
              description: Multimodal attachments (audio or image) detected by file extension keywords

        structure:
            - name: audio_attachment
              description: Detects audio file attachments (mp3, wav, m4a, ogg)
              feature:
                  type: exists
                  source:
                      type: regex
                      pattern: '(?i)\.(mp3|wav|m4a|ogg)\b'

            - name: vision_attachment
              description: Detects image file attachments (png, jpg, jpeg, webp)
              feature:
                  type: exists
                  source:
                      type: regex
                      pattern: '(?i)\.(png|jpg|jpeg|webp)\b'

            - name: multi_step_analysis
              description: Queries with multiple analysis steps or scenario modeling
              feature:
                  type: exists
                  source:
                      type: regex
                      pattern: '(?i)(waterfall scenarios|1x.*2x|compare.*vs|option A.*option B)'

            # ENHANCED: Long query detection for context-based routing
            - name: long_query
              description: Queries longer than 400 words suggesting complex analysis
              feature:
                  type: count
                  source:
                      type: regex
                      pattern: '\S+'
              predicate:
                  gte: 400

        complexity:
            - name: needs_reasoning
              threshold: 0.28
              description: MMBERT-scored route for synthesis-heavy and multi-step reasoning prompts
              hard:
                  candidates:
                      - analyze the root cause step by step and compare multiple mitigation strategies
                      - derive and prove this formula or theorem mathematically with formal justification
                      - explain the tradeoffs between different approaches in depth and recommend the best one
                      - implement a complete solution handling all edge cases and failure modes
                      - design a system architecture that satisfies multiple conflicting constraints
                      - debug this complex issue by tracing through the execution path and identifying the fault
                      - optimize this algorithm or system for time complexity and memory usage
                      - synthesize findings from multiple sources and draw a well-reasoned conclusion
                      - model equity dilution across multiple funding rounds with complex scenarios
                      - compare retention strategies across multiple variables and recommend optimal approach
              easy:
                  candidates:
                      - what is the definition of this term
                      - give a quick one-sentence answer
                      - briefly summarize this in a few words
                      - what does this word or acronym mean
                      - answer yes or no to this simple question
                      - translate this short phrase into another language
                      - convert this value from one unit to another
                      - what is our burn rate

        # Security: PII detection (names, emails, salaries, SSN)
        pii:
            - name: employee_pii
              threshold: 0.65
              description: Detects employee names, salaries, emails, SSN
              pii_types_allowed:
                  - DATE_TIME    
                  - ORGANIZATION 
                  - GPE         
                  - NRP
        # Security: Jailbreak detection
        jailbreak:
            - name: prompt_injection
              method: hybrid
              threshold: 0.85
              description: Detects jailbreak attempts

    decisions:
        # PRIORITY 1000: Security - PII or jailbreak → LOCAL ONLY
        - name: workshop_security_local
          description: "Workshop Rule 1: PII-sensitive HR/Finance queries stay local (employee names, salaries, emails)"
          priority: 1000
          rules:
              operator: OR
              conditions:
                  - type: pii
                    name: employee_pii
                  - type: jailbreak
                    name: prompt_injection
          modelRefs:
              - model: Qwen3.5-9B-NoThinking
                use_reasoning: false
          algorithm:
              type: static

        - name: workshop_audio_gemma
          description: "Workshop Rule 2a: Audio attachments (mp3, wav, m4a, ogg) route to local gemma4-e4b-qat-gguf-NoThinking for native multimodal processing"
          priority: 910
          rules:
              operator: AND
              conditions:
                  - type: structure
                    name: audio_attachment
          modelRefs:
              - model: Qwen3.6-35B-A3B-NoThinking
                use_reasoning: false
          algorithm:
              type: static

        # PRIORITY 900: Vision/image files → Qwen (local multimodal)
        - name: workshop_vision_local
          description: "Workshop Rule 2b: Image attachments (png, jpg, jpeg, webp) route to local Qwen for vision analysis"
          priority: 900
          rules:
              operator: AND
              conditions:
                  - type: structure
                    name: vision_attachment
          modelRefs:
              - model: Qwen3.5-9B-NoThinking
                use_reasoning: false
          algorithm:
              type: static

        # PRIORITY 800: Legal research → CLOUD (no PII)
        - name: workshop_legal_cloud
          description: "Workshop Rule 3: Legal regulatory research uses cloud (GDPR, compliance, contracts)"
          priority: 800
          rules:
              operator: AND
              conditions:
                  - operator: NOT
                    conditions:
                        - type: pii
                          name: employee_pii
                  - operator: OR
                    conditions:
                        - type: keyword
                          name: legal_research_keywords
                        - type: domain
                          name: law
          modelRefs:
              - model: accounts/fireworks/models/kimi-k2p6
                use_reasoning: false
          algorithm:
              type: static

        # PRIORITY 700: R&D system design → LOCAL 35B (no PII)
        - name: workshop_rnd_local_strong
          description: "Workshop Rule 4: R&D system design and ML pipeline uses local strong model"
          priority: 700
          rules:
              operator: AND
              conditions:
                  - operator: NOT
                    conditions:
                        - type: pii
                          name: employee_pii
                  - operator: OR
                    conditions:
                        - type: keyword
                          name: rnd_design_keywords
                        - type: domain
                          name: computer_science
          modelRefs:
              - model: Qwen3.6-35B-A3B-NoThinking
                use_reasoning: false
          algorithm:
              type: static

        # PRIORITY 650: ENHANCED - Long queries (400+ words) → CLOUD (no PII)
        - name: workshop_long_query_cloud
          description: "ADVANCED: Very long queries (400+ words) likely need cloud capacity"
          priority: 650
          rules:
              operator: AND
              conditions:
                  - type: structure
                    name: long_query
                  - operator: NOT
                    conditions:
                        - type: pii
                          name: employee_pii
          modelRefs:
              - model: accounts/fireworks/models/kimi-k2p6
                use_reasoning: false
          algorithm:
              type: static

        # PRIORITY 600: Finance complex modeling → CLOUD (no PII)
        - name: workshop_finance_complex_cloud
          description: "Workshop Rule 5: Complex finance modeling (equity dilution, waterfall) uses cloud when no PII"
          priority: 600
          rules:
              operator: AND
              conditions:
                  - operator: NOT
                    conditions:
                        - type: pii
                          name: employee_pii
                  - operator: OR
                    conditions:
                        - type: keyword
                          name: finance_modeling_keywords
                        - type: structure
                          name: multi_step_analysis
                        - operator: AND
                          conditions:
                              - type: domain
                                name: finance
                              - type: complexity
                                name: needs_reasoning:high
          modelRefs:
              - model: accounts/fireworks/models/kimi-k2p6
                use_reasoning: false
          algorithm:
              type: static

        # PRIORITY 550: Simple finance and HR policy queries → LOCAL
        - name: workshop_simple_local
          description: "Workshop Rule 6: Simple finance (burn rate) and HR policy queries stay local"
          priority: 550
          rules:
              operator: OR
              conditions:
                  - type: keyword
                    name: finance_simple_keywords
                  - type: keyword
                    name: hr_policy_keywords
                  - type: complexity  # ENHANCED: Low complexity → local
                    name: needs_reasoning:low
          modelRefs:
              - model: Qwen3.5-9B-NoThinking
                use_reasoning: false
          algorithm:
              type: static

        # PRIORITY 500: ENHANCED - Confidence Loop for medium complexity (no PII)
        - name: workshop_confidence_loop
          description: "ADVANCED: Medium-complexity queries → try local first, escalate to cloud if low confidence"
          priority: 500
          rules:
              operator: AND
              conditions:
                  - type: complexity
                    name: needs_reasoning:medium
                  - operator: NOT
                    conditions:
                        - type: pii
                          name: employee_pii
          modelRefs:
              - model: Qwen3.5-9B-NoThinking
                use_reasoning: false
              - model: accounts/fireworks/models/kimi-k2p6
                use_reasoning: false
          algorithm:
              type: confidence
              confidence:
                  confidence_method: self_verify
                  threshold: 0.97
                  escalation_order: cost
                  cost_quality_tradeoff: 0.3

        # PRIORITY 100: Default fallback → LOCAL
        - name: workshop_default_local
          description: "Workshop Rule 7: All other queries default to local model"
          priority: 100
          rules:
              operator: AND
              conditions:
                  - type: pii
                    name: employee_pii
                    negate: true  # Match if no PII
          modelRefs:
              - model: Qwen3.5-9B-NoThinking
                use_reasoning: false
          algorithm:
              type: static

global:
    router:
        config_source: file
        auto_model_name: MoM
        include_config_models_in_list: false
        clear_route_cache: true
        streamed_body:
            enabled: false
        skip_processing:
            enabled: false
        model_selection:
            method: static
            enabled: true

    services:
        api:
            batch_classification: {}
        response_api:
            enabled: true
            store_backend: redis
            ttl_seconds: 86400
            max_responses: 1000
        observability:
            tracing:
                enabled: true
                provider: opentelemetry
                exporter:
                    type: otlp
                    endpoint: vllm-sr-jaeger:4317
                    insecure: true
                sampling:
                    type: always_on
                    rate: 1
                resource:
                    service_name: vllm-sr-workshop
                    service_version: v0.3.0
                    deployment_environment: workshop
            metrics:
                enabled: true
                windowed_metrics:
                    enabled: false
                    model_metrics: false
                    queue_depth_estimation: false
        authz: {}
        ratelimit: {}
        router_replay:
            enabled: true
            store_backend: postgres
            ttl_seconds: 2592000
        startup_status:
            store_backend: file

    stores:
        semantic_cache:
            backend_type: memory
            enabled: true
            max_entries: 500
            ttl_seconds: 1800
            eviction_policy: fifo
        memory:
            milvus:
                address: ""
                collection: agentic_memory
                dimension: 384
            extraction_batch_size: 10
            default_retrieval_limit: 5
            default_similarity_threshold: 0.7

    integrations:
        tools:
            enabled: false
        looper:
            endpoint: http://vllm-sr-envoy-container:8899/v1/chat/completions
            timeout_seconds: 1200
            model_endpoints:
                accounts/fireworks/models/kimi-k2p6: https://api.fireworks.ai/inference/v1/chat/completions

    model_catalog:
        embeddings:
            semantic:
                qwen3_model_path: ""
                gemma_model_path: ""
                mmbert_model_path: models/mmbert-embed-32k-2d-matryoshka
                bert_model_path: ""
                use_cpu: true
                embedding_config:
                    model_type: mmbert
                    preload_embeddings: true
                    target_dimension: 768
                    target_layer: 22
                    enable_soft_matching: true
                    top_k: 1
                    min_score_threshold: 0.5

        system:
            prompt_guard: models/mmbert32k-jailbreak-detector-merged
            domain_classifier: models/mmbert32k-intent-classifier-merged
            pii_classifier: models/mmbert32k-pii-detector-merged
            fact_check_classifier: models/mmbert32k-factcheck-classifier-merged
            feedback_detector: models/mmbert32k-feedback-detector-merged

        modules:
            prompt_compression:
                enabled: false
                max_tokens: 0

            prompt_guard:
                enabled: true
                model_id: ""
                threshold: 0.7
                use_cpu: true
                use_modernbert: false
                use_mmbert_32k: true
                jailbreak_mapping_path: models/mmbert32k-jailbreak-detector-merged/jailbreak_type_mapping.json
                model_ref: prompt_guard

            classifier:
                domain:
                    model_id: ""
                    threshold: 0.5
                    use_cpu: true
                    use_modernbert: false
                    use_mmbert_32k: true
                    category_mapping_path: models/mmbert32k-intent-classifier-merged/category_mapping.json
                    model_ref: domain_classifier
                mcp:
                    enabled: false
                pii:
                    model_id: ""
                    threshold: 0.65
                    use_cpu: true
                    use_mmbert_32k: true
                    pii_mapping_path: models/mmbert32k-pii-detector-merged/pii_type_mapping.json
                    model_ref: pii_classifier
                preference:
                    use_contrastive: true

            complexity:
                prototype_scoring:
                    enabled: true  # ENHANCED: Enable complexity scoring
                    cluster_similarity_threshold: 0.9
                    max_prototypes: 8
                    best_weight: 0.75
                    top_m: 2

            feedback_detector:
                enabled: true  # ENHANCED: Enable feedback detection
                model_id: ""
                threshold: 0.7
                use_cpu: true
                use_modernbert: false
                use_mmbert_32k: true
                feedback_mapping_path: ""
                model_ref: feedback_detector

            modality_detector:
                enabled: true
                method: keyword
                keywords:
                    - mp3
                    - wav
                    - m4a
                    - ogg
                    - png
                    - jpg
                    - jpeg
                    - webp
